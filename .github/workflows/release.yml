name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create plugin directory
        run: |
          mkdir -p choice-uft
          rsync -av --exclude-from='.distignore' --exclude='.git' --exclude='*.zip' . choice-uft/

      - name: Create zip file
        run: |
          ZIP_NAME="choice-uft-v${{ steps.get_version.outputs.VERSION }}.zip"
          zip -r "$ZIP_NAME" choice-uft/
          echo "Created plugin zip: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Extracting release notes for version $VERSION"

          # Extract the section for this version from CHANGELOG.md
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($2 == "["ver"]") found=1
            }
            found && !/^## \[/ { print }
          ' CHANGELOG.md > release_notes.md

          # Append installation instructions
          cat >> release_notes.md << ENDOFNOTES

## Installation

### Automatic Update
If you already have the plugin installed, it should automatically detect this update. Go to **Plugins** in your WordPress admin and click **Update Now**.

### Manual Installation
1. Download the \`choice-uft-v${VERSION}.zip\` file from the assets below
2. In WordPress admin, go to **Plugins → Add New → Upload Plugin**
3. Choose the downloaded zip file and click **Install Now**
4. Activate the plugin after installation

## Requirements
- WordPress 5.0 or higher
- PHP 7.4 or higher

## Support
For issues or questions, please visit: https://github.com/ChoiceOMG/choice-uft/issues
ENDOFNOTES

          echo "Release notes generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Version ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes.md
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "✅ Release created successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Asset:** ${{ env.ZIP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The plugin will be available for automatic updates within a few minutes." >> $GITHUB_STEP_SUMMARY
